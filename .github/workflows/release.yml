name: Build Release Binaries

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact-name: markdown-editor-windows
            binary: target/x86_64-pc-windows-msvc/release/markdown_editor_rust.exe

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact-name: markdown-editor-macos-intel
            binary: target/x86_64-apple-darwin/release/markdown_editor_rust

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact-name: markdown-editor-macos-apple-silicon
            binary: target/aarch64-apple-darwin/release/markdown_editor_rust

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.binary }}

  universal-macos:
    needs: build
    runs-on: macos-latest

    steps:
      - name: Download Intel binary
        uses: actions/download-artifact@v4
        with:
          name: markdown-editor-macos-intel
          path: intel/

      - name: Download Apple Silicon binary
        uses: actions/download-artifact@v4
        with:
          name: markdown-editor-macos-apple-silicon
          path: silicon/

      - name: Create universal binary
        run: |
          chmod +x intel/markdown_editor_rust silicon/markdown_editor_rust
          lipo -create -output markdown_editor_rust \
            intel/markdown_editor_rust \
            silicon/markdown_editor_rust

      - name: Upload universal binary
        uses: actions/upload-artifact@v4
        with:
          name: markdown-editor-macos-universal
          path: markdown_editor_rust

  release:
    needs: [build, universal-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: markdown-editor-windows
          path: release/

      - name: Download macOS universal artifact
        uses: actions/download-artifact@v4
        with:
          name: markdown-editor-macos-universal
          path: release/

      - name: Rename artifacts
        run: |
          mv release/markdown_editor_rust.exe release/markdown-editor-windows.exe
          mv release/markdown_editor_rust release/markdown-editor-macos-universal
          chmod +x release/markdown-editor-macos-universal

      - name: Publish versioned release (tag push)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            release/*

      - name: Publish latest release (main branch)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
          gh release create latest \
            --title "Latest Build" \
            --notes "Automatically built from main ($(git rev-parse --short HEAD))" \
            --prerelease \
            release/*
